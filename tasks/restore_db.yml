---
- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: /root/.config/rclone
    state: directory
    mode: "0700"

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /root/.config/rclone/rclone.conf
    mode: "0600"
  no_log: true

- name: Deploy restore script
  ansible.builtin.template:
    src: x-ui-restore-r2.sh.j2
    dest: /usr/local/bin/x-ui-restore-r2.sh
    mode: "0700"
  no_log: true

- name: Run restore script
  ansible.builtin.command: /usr/local/bin/x-ui-restore-r2.sh
  changed_when: true
